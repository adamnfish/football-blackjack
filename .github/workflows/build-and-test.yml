name: build-and-test

on:
  pull_request:
  push:
    branches: [main]
  # Called by the deploy workflow, which runs the full suite before deploying
  workflow_call:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: guardian/setup-scala@v1
      - name: Format check and tests
        run: sbt --batch "scalafmtCheckAll; scalafmtSbtCheck; test"

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .tool-versions
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: elm-format check
        run: pnpm --dir frontend exec elm-format --validate src/
      - name: Build frontend
        run: pnpm --dir frontend build

  infrastructure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .tool-versions
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm --dir infrastructure build
      - name: CDK snapshot tests
        run: pnpm --dir infrastructure test

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: guardian/setup-scala@v1
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .tool-versions
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(pnpm --dir e2e exec playwright --version | awk '{print $2}')" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ runner.arch }}-${{ steps.playwright-version.outputs.version }}
      # Skips the browser download on a cache hit; --with-deps still
      # installs the OS packages, which aren't cached
      - name: Install Playwright browsers
        run: pnpm --dir e2e exec playwright install --with-deps chromium
      # `sbt devServer/run` can't start the server here: sbt 2 delegates `run`
      # to its client via an sbt/clientJob event that the CI runner script
      # doesn't understand, so sbt exits successfully without launching the
      # JVM. Build a jar and run it directly instead.
      - name: Start the dev server
        run: |
          sbt --batch devServer/assembly
          nohup java -jar target/out/jvm/scala-3.8.4/dev-server/dev-server.jar > devserver.log 2>&1 &
          for i in $(seq 1 30); do
            if curl --fail -s -o /dev/null -X POST http://localhost:9090/api/ping; then
              echo "dev server is up"; exit 0
            fi
            sleep 2
          done
          echo "dev server failed to start"; cat devserver.log; exit 1
      - name: Run the e2e suite
        run: pnpm --dir e2e test
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots
          path: e2e/screenshots/
          if-no-files-found: ignore
      - name: Show dev server log on failure
        if: failure()
        run: cat devserver.log || true
