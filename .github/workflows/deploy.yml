name: deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to deploy to
        required: true
        type: choice
        options:
          - test
          - prod

permissions:
  contents: read

jobs:
  build-and-test:
    uses: ./.github/workflows/build-and-test.yml
    permissions:
      contents: read
      actions: write

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test
    environment: ${{ inputs.environment }}
    # Deploys to the same environment queue rather than overlap; a running
    # CloudFormation deploy is never cancelled
    concurrency: deploy-${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: guardian/setup-scala@v1
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .tool-versions
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Build the api Lambda
        run: sbt --batch api/assembly
      - name: Build the frontend
        run: pnpm --dir frontend build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          mask-aws-account-id: true

      # Belt-and-braces second masking layer: registers the account id as a
      # masked value for all subsequent log output in this job
      - name: Mask AWS account id
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query 'Account' --output text)
          echo "::add-mask::${ACCOUNT_ID}"

      - name: Deploy
        run: >
          pnpm --dir infrastructure exec cdk deploy
          FootballBlackjack-${{ inputs.environment }}
          --require-approval never
